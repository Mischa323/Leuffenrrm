<!DOCTYPE html>
<html lang="en" data-theme="dark" data-density="comfortable" data-dataviz="on">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leuffen RMM — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div style="min-height:100vh;display:grid;place-items:center;padding:24px">
    <form id="login" style="width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);padding:32px">
      <div style="display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;margin-bottom:6px">
        <span class="logo" id="brand-logo" style="width:30px;height:30px;display:inline-grid;place-items:center;border-radius:var(--r-md);background:linear-gradient(140deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#000));color:#fff"></span>
        Leuffen <span style="color:var(--text-dim)">RMM</span>
      </div>
      <p style="color:var(--text-dim);font-size:13px;margin:0 0 22px">Sign in with your local account.</p>
      <label style="display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px">Username</label>
      <input id="u" autocomplete="username" style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;color:var(--text);font-size:14px;margin-bottom:14px" />
      <label style="display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px">Password</label>
      <input id="p" type="password" autocomplete="current-password" style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;color:var(--text);font-size:14px;margin-bottom:8px" />
      <div id="mfa" class="hidden" style="margin-bottom:8px">
        <label style="display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px">Authentication code</label>
        <input id="c" inputmode="numeric" autocomplete="one-time-code" placeholder="123456" style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;color:var(--text);font-size:14px;letter-spacing:.25em;font-family:var(--font-mono)" />
        <div style="color:var(--text-dim);font-size:12px;margin-top:6px">Enter the 6-digit code from your authenticator app, or a recovery code.</div>
      </div>
      <div id="err" style="color:var(--bad);font-size:12.5px;min-height:18px;margin-bottom:10px"></div>
      <button class="btn" id="submit" type="submit" style="width:100%;justify-content:center;padding:11px">Sign in</button>
      <div id="ssobox" class="hidden" style="margin-top:16px">
        <div style="display:flex;align-items:center;gap:10px;color:var(--text-faint);font-size:12px;margin-bottom:14px"><span style="flex:1;height:1px;background:var(--border)"></span>OR<span style="flex:1;height:1px;background:var(--border)"></span></div>
        <a class="btn ghost" href="/auth/sso" style="width:100%;justify-content:center;padding:11px;text-decoration:none">Sign in with Microsoft 365</a>
      </div>
    </form>
  </div>
  <script src="/icons.js"></script>
  <script src="/appearance.js"></script>
  <script>
    document.getElementById("brand-logo").innerHTML = ICON.shield.replace("<svg", '<svg style="width:18px;height:18px"');
    // Show the Microsoft 365 option in hybrid mode; hide the local form if SSO-only.
    fetch("/api/auth/config").then((r) => r.json()).then((c) => {
      if (c.sso) document.getElementById("ssobox").classList.remove("hidden");
      if (!c.local) {
        ["u", "p", "submit"].forEach((id) => document.getElementById(id).classList.add("hidden"));
        document.querySelectorAll("#login label").forEach((l) => l.classList.add("hidden"));
      }
    }).catch(() => {});
    let mfaStep = false;
    document.getElementById("login").onsubmit = async (e) => {
      e.preventDefault();
      const err = document.getElementById("err"); err.textContent = "";
      const body = { username: document.getElementById("u").value, password: document.getElementById("p").value };
      if (mfaStep) body.code = document.getElementById("c").value;
      try {
        const r = await fetch("/api/auth/local-login", {
          method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
        });
        if (r.status === 204) { location.href = "/"; return; }
        const data = await r.json().catch(() => ({}));
        if (r.ok && data.mfa_required) {
          mfaStep = true;
          document.getElementById("mfa").classList.remove("hidden");
          document.getElementById("submit").textContent = "Verify";
          document.getElementById("c").focus();
          return;
        }
        err.textContent = data.detail || "Sign-in failed";
      } catch (ex) { err.textContent = ex.message; }
    };
  </script>
</body>
</html>
