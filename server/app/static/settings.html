<!DOCTYPE html>
<html lang="en" data-theme="dark" data-density="comfortable" data-dataviz="on">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leuffen RMM — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <div class="app">
    <header class="topbar" id="topbar"></header>
    <main>
      <div class="page-head"><div><h1>Settings</h1><p>Server-wide configuration · global admin</p></div></div>

      <div class="settings-layout">
        <aside class="settings-nav" id="settings-nav">
          <div class="sn-label">Workspace</div>
          <button data-sec="general" class="active"></button>
          <button data-sec="orgs"></button>
          <button data-sec="users"></button>
          <div class="divider"></div>
          <div class="sn-label">System</div>
          <button data-sec="auth"></button>
          <button data-sec="alerts"></button>
          <button data-sec="security"></button>
          <button data-sec="agents"></button>
          <div class="divider"></div>
          <div class="sn-label">Personal</div>
          <button data-sec="appearance"></button>
        </aside>
        <div class="settings-main" id="settings-main"></div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"><span id="toast-ico"></span><span></span></div>

  <script src="icons.js"></script>
  <script src="appearance.js"></script>
  <script src="chrome.js"></script>
  <script src="settings.js"></script>
</body>
</html>
