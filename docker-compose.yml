services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: leuffen-rmm-server
    # host networking lets the server broadcast Wake-on-LAN on its own LAN and
    # keeps WebSocket/SSO redirects simple. Swap to a ports mapping if preferred.
    network_mode: host
    environment:
      # Agent enrolment key for the seeded "Default" org. CHANGE THIS.
      RMM_API_KEY: "change-me-please"
      RMM_PUBLIC_URL: "http://localhost:8000"
      SESSION_SECRET: "change-me-too"
      # --- Office 365 SSO (leave blank to run in dev-auth mode) ---
      MS_TENANT_ID: ""
      MS_CLIENT_ID: ""
      MS_CLIENT_SECRET: ""
      MS_REDIRECT_URI: "http://localhost:8000/auth/callback"
      RMM_BOOTSTRAP_ADMIN: "admin@example.com"
      # --- Graph alert mail (optional) ---
      GRAPH_SENDER: ""
      # --- Alert thresholds (defaults for new orgs) ---
      ALERT_CPU_PCT: "90"
      ALERT_DISK_FREE_PCT: "10"
      ALERT_MEM_PCT: "90"
    volumes:
      - rmm-data:/data
    restart: unless-stopped

volumes:
  rmm-data:
